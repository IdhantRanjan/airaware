name: Live Sensor Collection

# Runs every 5 minutes, 24/7.
# Fetches all 11 sensors from PurpleAir, inserts readings into Supabase.
# One batch per run (no while loop needed — GH Actions handles the cadence).
on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes
  workflow_dispatch:          # Manual trigger from GitHub Actions UI

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # Kill if stuck before next run starts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-collect-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-collect-

      - name: Install dependencies
        run: pip install requests supabase python-dotenv

      - name: Run one collection cycle
        env:
          PURPLEAIR_API_KEY:   ${{ secrets.PURPLEAIR_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/collect_once.py
